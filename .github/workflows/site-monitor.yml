name: Site monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run Masoret site monitor
        if: ${{ secrets.AUTOMATION_API_SECRET != '' }}
        run: |
          curl --fail --show-error --silent \
            -H "x-automation-secret: ${{ secrets.AUTOMATION_API_SECRET }}" \
            "https://masoret-dashboard.vercel.app/api/monitor/run"

      - name: Explain missing secret
        if: ${{ secrets.AUTOMATION_API_SECRET == '' }}
        run: |
          echo "AUTOMATION_API_SECRET is not configured in GitHub repository secrets."
          echo "The Vercel daily cron will still run if it is deployed."
