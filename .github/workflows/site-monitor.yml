name: Site monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run Masoret site monitor
        env:
          AUTOMATION_API_SECRET: ${{ secrets.AUTOMATION_API_SECRET }}
        run: |
          if [ -z "$AUTOMATION_API_SECRET" ]; then
            echo "AUTOMATION_API_SECRET is not configured in GitHub repository secrets."
            echo "The Vercel daily cron will still run if it is deployed."
            exit 0
          fi

          curl --fail --show-error --silent \
            -H "x-automation-secret: $AUTOMATION_API_SECRET" \
            "https://masoret-dashboard.vercel.app/api/monitor/run"
